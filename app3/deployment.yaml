apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
  namespace: multi-app
  labels:
    app: app3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
        - name: app3
          image: your-registry/app3:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
