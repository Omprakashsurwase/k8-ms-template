common:
  namespace: multi-app
  appDomain: example.com
  replicaCount: 2
  ingress:
    enabled: true
    ingressClassName: nginx
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    - name: ENVIRONMENT
      value: production
  apps:
    - name: app1
      image: your-registry/app1:latest
      port: 8080
      host: app1.example.com
    - name: app2
      image: your-registry/app2:latest
      port: 8080
      host: app2.example.com
    - name: app3
      image: your-registry/app3:latest
      port: 8080
      host: app3.example.com
