apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  namespace: multi-app
  labels:
    app: app2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: app2
          image: your-registry/app2:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
