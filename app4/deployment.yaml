apiVersion: apps/v1
kind: Deployment
metadata:
  name: app4
  namespace: multi-app
  labels:
    app: app4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app4
  template:
    metadata:
      labels:
        app: app4
    spec:
      containers:
        - name: app4
          image: your-registry/app4:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
