apiVersion: apps/v1
kind: Deployment
metadata:
  name: app9
  namespace: multi-app
  labels:
    app: app9
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app9
  template:
    metadata:
      labels:
        app: app9
    spec:
      containers:
        - name: app9
          image: your-registry/app9:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
