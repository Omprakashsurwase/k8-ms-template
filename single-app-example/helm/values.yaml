namespace: single-app
appName: myapp

replicaCount: 2

image:
  registry: docker.io
  repository: your-username/single-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  hostname: app.example.com
  ingressClassName: nginx

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  - name: ENVIRONMENT
    value: production
  - name: APP_VERSION
    value: "1.0.0"
