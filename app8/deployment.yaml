apiVersion: apps/v1
kind: Deployment
metadata:
  name: app8
  namespace: multi-app
  labels:
    app: app8
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app8
  template:
    metadata:
      labels:
        app: app8
    spec:
      containers:
        - name: app8
          image: your-registry/app8:latest
          ports:
            - containerPort: 8080
          env:
            - name: ENVIRONMENT
              value: production
