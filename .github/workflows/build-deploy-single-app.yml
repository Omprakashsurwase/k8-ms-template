name: Build and Deploy Single App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: omprakashsurwase/single-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:latest ./single-app-example

      - name: Push Docker image
        run: |
          docker push $REGISTRY/$IMAGE_NAME:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    env:
      KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Configure Kubeconfig
        if: env.KUBECONFIG_DATA != ''
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        if: env.KUBECONFIG_DATA != ''
        run: |
          helm upgrade --install single-app ./single-app-example/helm \
            --namespace single-app \
            --create-namespace

      - name: Skip if no cluster
        if: env.KUBECONFIG_DATA == ''
        run: echo "Skipping deployment (no KUBECONFIG)"
