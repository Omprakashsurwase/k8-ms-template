name: Helm Bootstrap CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Run bootstrap script
        run: pwsh -NoProfile -ExecutionPolicy Bypass ./bootstrap.ps1

      - name: Lint Helm chart
        run: pwsh -NoProfile -ExecutionPolicy Bypass -Command "helm lint ."

      - name: Package Helm chart
        run: pwsh -NoProfile -ExecutionPolicy Bypass -Command "helm package ."

  deploy-if-cluster-available:
    runs-on: windows-latest
    needs: build-and-lint
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kubeconfig
        if: ${{ secrets.KUBECONFIG != '' }}
        run: |
          $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.KUBECONFIG }}"))
          Set-Content -Path "$env:RUNNER_TEMP\kubeconfig" -Value $decoded -Encoding utf8
          echo "KUBECONFIG=$env:RUNNER_TEMP\kubeconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Deploy Helm chart
        if: ${{ secrets.KUBECONFIG != '' }}
        run: pwsh -NoProfile -ExecutionPolicy Bypass -Command "helm upgrade --install multi-app . -f values.yaml -f values-override.yaml"

      - name: Skip deployment when no cluster available
        if: ${{ secrets.KUBECONFIG == '' }}
        run: echo "No KUBECONFIG secret provided; deployment skipped."
